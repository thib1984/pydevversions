commands:
  - name: bash
    categories: ["shell", "scripting", "devops"]
  - name: biome
    categories: ["development", "linting"]

  - name: brew
    categories: ["package-manager"]

  - name: cf
    version_cmd: ["cf", "version"]
    categories: ["devops"]

  - name: cf7
    version_cmd: ["cf7", "version"]
    categories: ["devops"]

  - name: cf8
    version_cmd: ["cf8", "version"]
    categories: ["devops"]

  - name: chromedriver
    categories: ["testing", "automation"]

  - name: chromium
    categories: ["browser", "network"]

  - name: chromium-flatpak
    version_cmd: ["flatpak", "run", "org.chromium.Chromium", "--version"]
    path_cmd: ["echo", "NA"]  
    categories: ["browser", "network"]

  - name: code
    categories: ["development", "ide"]

  - name: curl
    categories: ["network", "devops"]

  - name: docker
    categories: ["devops", "containers"]
    
