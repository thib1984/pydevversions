    version_cmd: ["docker", "compose", "version"]
    path_cmd: ["whereis", "-b", "docker"]
    categories: ["devops", "containers"]

  - name: ds_agent
    version_cmd: ["cat", "/opt/ds_agent/version.txt"]
    path_cmd: ["echo", " /opt/ds_agent/ds_agent"]
    categories: ["system", "security"]

  - name: firefox
    categories: ["browser", "network"]

  - name: flatpak
    categories: ["package-manager"]

  - name: fly
    categories: ["devops"]

