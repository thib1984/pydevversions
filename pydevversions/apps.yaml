    categories: ["development", "version-control"]

  - name: gnome-shell
    categories: ["system"]

  - name: google-chrome
    categories: ["browser", "network"]

  - name: google-chrome-stable
    categories: ["browser", "network"]

  - name: gradle
    categories: ["build", "development"]

  - name: groovy
    categories: ["language", "development", "scripting"]

  - name: hadolint
    categories: ["linting", "devops", "containers"]

  - name: helm
    version_cmd: ["helm", "version"]
    categories: ["devops", "kubernetes"]

  - name: httpd
    version_cmd: ["httpd", "-V"]
    categories: ["server", "network"]

  - name: intellij
    categories: ["development", "ide"]

  - name: intune-portal
    version_cmd: ["intune-portal", "-V"]
    categories: ["system"]

  - name: java
    categories: ["language", "runtime", "development"]

  - name: jq
    categories: ["cli", "json", "scripting"]

  - name: kernel
    version_cmd: ["uname", "-r"]
    path_cmd: ["bash", "-c", "readlink -f /boot/vmlinuz-$(uname -r)"]
    categories: ["system"]

  - name: kotlin
    version_cmd: ["kotlin", "-version"]
    categories: ["language", "development"]

  - name: krew
    version_cmd: ["krew", "version"]
    categories: ["devops", "kubernetes"]

  - name: kubectl
    version_cmd: ["kubectl", "version", "--client=true"]
    categories: ["devops", "kubernetes"]

  - name: k9s
    version_cmd: ["k9s", "version", "-s"]
    categories: ["devops", "kubernetes"]

  - name: lift
    version_cmd: ["lift", "version"]
    categories: ["system"]

  - name: linux
    version_cmd: ["cat", "/etc/os-release"]
    path_cmd: ["echo", "/etc/os-release"]
    categories: ["system"]

  - name: make
    categories: ["build", "development"]

  - name: microsoft-edge
    categories: ["browser", "network"]

  - name: mongo
    categories: ["database"]

  - name: mvn
    categories: ["build", "development"]

  - name: node
    categories: ["runtime", "js"]

  - name: nmap
    categories: ["network", "security", "pentesting"]

  - name: npm
    categories: ["package-manager", "js", "development"]

  - name: nvm
    categories: ["version-manager", "js", "development"]

  - name: pip
    categories: ["package-manager", "python", "development"]

  - name: pip3
    categories: ["package-manager", "python", "development"]

  - name: pipx
    categories: ["package-manager", "python", "cli"]

  - name: pulsesecure
    version_cmd: ["dpkg-query", "-W", "-f=${Version}\n", "pulsesecure"]
    path_cmd: ["echo", "/opt/pulsesecure/bin/pulsesecure"]
